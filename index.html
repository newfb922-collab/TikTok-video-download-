<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REHAN ZONE V3.5 | Premium TikTok Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #ff007a;
            --green-glow: #00ff99;
            --bg-dark: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-dark); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* Background Animation */
        .bg-animate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0d1117 0%, #05070a 100%); z-index: -1; }
        .blob { position: absolute; width: 300px; height: 300px; background: linear-gradient(45deg, var(--primary), var(--accent)); filter: blur(80px); border-radius: 50%; opacity: 0.1; animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        .header { text-align: center; padding: 40px 20px; }
        .badge { background: rgba(0,242,254,0.1); border: 1px solid var(--glass-border); color: var(--primary); padding: 5px 15px; border-radius: 50px; font-size: 10px; font-weight: 700; display: inline-block; margin-bottom: 10px; }
        h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { width: 92%; max-width: 850px; background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); margin-bottom: 80px; }
        
        .input-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        input { width: 100%; padding: 16px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 14px; color: white; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 242, 254, 0.1); }
        button#mainBtn { width: 100%; padding: 16px; background: white; border: none; border-radius: 14px; color: black; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 13px; transition: 0.3s; }
        button#mainBtn:hover { transform: scale(1.02); }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-card { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 14px; text-align: center; border: 1px solid var(--glass-border); }
        .stat-card span { display: block; font-size: 9px; opacity: 0.5; margin-bottom: 3px; }
        .stat-card b { font-size: 16px; color: var(--primary); }

        /* Layout */
        .content-layout { display: flex; flex-direction: column; gap: 20px; }
        .video-preview { width: 100%; max-width: 300px; margin: 0 auto; }
        #thumb { width: 100%; border-radius: 18px; border: 1px solid var(--glass-border); aspect-ratio: 9/16; object-fit: cover; }

        .details-panel { display: flex; flex-direction: column; gap: 15px; }
        .data-box { background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 15px; border-radius: 18px; }
        .data-box label { font-size: 10px; color: var(--primary); font-weight: 700; margin-bottom: 8px; display: block; }
        
        #caption { width: 100%; background: transparent; border: none; color: #fff; font-size: 14px; line-height: 1.4; resize: none; height: 80px; outline: none; }
        
        .action-btns { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn-small { padding: 14px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass); color: white; text-decoration: none; text-align: center; font-size: 13px; font-weight: 600; transition: 0.2s; }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            h1 { font-size: 3rem; }
            .input-box { flex-direction: row; }
            button#mainBtn { width: auto; padding: 0 30px; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
            .content-layout { flex-direction: row; }
            .action-btns { grid-template-columns: 1fr 1fr; }
            .video-preview { margin: 0; }
        }

        /* Branding Tag - Updated as per your request */
        #rehan-tag { 
            position: fixed; 
            bottom: 25px; 
            right: 15px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            color: white; 
            padding: 10px 22px; 
            border-radius: 50px; 
            font-weight: 800; 
            font-size: 11px; 
            white-space: nowrap; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            z-index: 1000;
            cursor: pointer;
            border: 2px solid var(--green-glow); 
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6); 
            transition: 0.3s ease;
        }

        #rehan-tag:hover {
            transform: translateY(-5px) scale(1.05);
            background: rgba(0, 255, 153, 0.1);
            border-color: white;
        }

        #resultSection { display: none; }
        .error { display: none; color: #ff4d4d; text-align: center; padding: 12px; background: rgba(255,77,77,0.1); border-radius: 12px; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="bg-animate"><div class="blob"></div></div>

<div class="header">
    <span class="badge">REHAN ZONE ULTIMATE v3.5</span>
    <h1>TIKTOK AI</h1>
</div>

<div class="container">
    <div class="input-box">
        <input type="text" id="url" placeholder="Paste Video Link...">
        <button id="mainBtn" onclick="analyze()">Analyze</button>
    </div>

    <div id="error" class="error"></div>

    <div id="resultSection">
        <div class="stats-grid">
            <div class="stat-card"><span>Views</span><b id="v_views">0</b></div>
            <div class="stat-card"><span>Likes</span><b id="v_likes">0</b></div>
            <div class="stat-card"><span>Shares</span><b id="v_shares">0</b></div>
            <div class="stat-card"><span>Comments</span><b id="v_comments">0</b></div>
        </div>

        <div class="content-layout">
            <div class="video-preview">
                <img id="thumb" src="" alt="Cover">
            </div>
            
            <div class="details-panel">
                <div class="data-box">
                    <label>CAPTION</label>
                    <textarea id="caption" readonly></textarea>
                    <button class="btn-small" style="width:100%; margin-top:10px; background: var(--primary); color:black; border:none;" onclick="copyText()">Copy Caption</button>
                </div>

                <div class="data-box">
                    <label>MUSIC</label>
                    <p id="m_title" style="font-weight: 600; font-size: 13px;"></p>
                    <p id="m_author" style="font-size: 11px; opacity: 0.6;"></p>
                </div>

                <div class="action-btns">
                    <a id="dl_video" class="btn-small" target="_blank" style="background: white; color: black; border:none;">🚀 Video (No WM)</a>
                    <a id="dl_audio" class="btn-small" target="_blank">🎵 Audio (MP3)</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="rehan-tag" onclick="window.open('https://wa.me/923116071073')">
    POWERED BY <b>REHAN ZONE</b>
</div>

<script>
async function analyze() {
    const input = document.getElementById('url').value.trim();
    const btn = document.getElementById('mainBtn');
    const res = document.getElementById('resultSection');
    const err = document.getElementById('error');

    if(!input.includes('tiktok.com')) {
        err.innerText = "Invalid TikTok Link!";
        err.style.display = 'block';
        return;
    }

    btn.innerText = 'FETCHING...';
    btn.disabled = true;
    err.style.display = 'none';
    res.style.display = 'none';

    try {
        const response = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(input)}`);
        const result = await response.json();

        if(result.code === 0) {
            const d = result.data;
            document.getElementById('caption').value = d.title || 'No Caption';
            document.getElementById('v_views').innerText = d.play_count.toLocaleString();
            document.getElementById('v_likes').innerText = d.digg_count.toLocaleString();
            document.getElementById('v_shares').innerText = d.share_count.toLocaleString();
            document.getElementById('v_comments').innerText = d.comment_count.toLocaleString();
            document.getElementById('m_title').innerText = "🎵 " + d.music_info.title;
            document.getElementById('m_author').innerText = "👤 " + d.music_info.author;
            document.getElementById('thumb').src = d.cover;
            document.getElementById('dl_video').href = d.play;
            document.getElementById('dl_audio').href = d.music;
            res.style.display = 'block';
            res.scrollIntoView({ behavior: 'smooth' });
        } else {
            err.innerText = 'Video not found or Private!';
            err.style.display = 'block';
        }
    } catch(e) {
        err.innerText = 'Server Error!';
        err.style.display = 'block';
    } finally {
        btn.innerText = 'Analyze';
        btn.disabled = false;
    }
}

function copyText() {
    const text = document.getElementById('caption');
    text.select();
    document.execCommand('copy');
    alert('Caption Copied!');
}
</script>

</body>
</html>
