<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium TikTok Downloader | REHAN-ZONE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #ff007a;
            --bg-dark: #080a0f;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Animated Background Blobs */
        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1f35 0%, #080a0f 100%);
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* Header Section */
        .header {
            text-align: center;
            padding: 50px 20px;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .badge {
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 700px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--glass-border);
            border-radius: 15px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 15px;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.4);
            filter: brightness(1.1);
        }

        /* Results & Links */
        .result {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-weight: 500;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
        }

        .download-btn.primary-dl {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--primary);
        }

        .error {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            text-align: center;
            font-size: 14px;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
            opacity: 0.6;
            font-size: 13px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Rehan Zone Branding UI */
        #rehan-branding {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1000;
            background: linear-gradient(45deg, #0f9, #00f2fe);
            color: black;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        
        #rehan-branding:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 25px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

<div class="bg-animate">
    <div class="blob"></div>
</div>

<div class="header">
    <span class="badge">OFFICIAL V2.0</span>
    <h1>REHAN ZONE</h1>
    <p style="opacity: 0.7;">Premium TikTok Video Downloader</p>
</div>

<div class="container">
    <div class="input-group">
        <input type="text" id="tiktokUrl" placeholder="Paste link: https://tiktok.com/...">
    </div>
    <button onclick="downloadVideo()" id="mainBtn">Generate Links</button>

    <div class="error" id="error"></div>

    <div class="result" id="result">
        <p style="text-align: center; margin-bottom: 20px; color: var(--primary); font-weight: 600;">VIDEO READY FOR DOWNLOAD</p>
        <a class="download-btn primary-dl" id="nowm" target="_blank">
            <span>🚀</span> No Watermark (HD)
        </a>
        <a class="download-btn" id="wm" target="_blank">
            <span>🎬</span> Original Watermark
        </a>
        <a class="download-btn" id="audio" target="_blank">
            <span>🎵</span> Download Audio MP3
        </a>
    </div>
</div>

<footer>
    <p>© 2026 REHAN-ZONE®. All Rights Reserved.</p>
</footer>

<div id="rehan-branding" onclick="window.open('https://wa.me/923116071073')">
    🚀 Hosted by <b>REHAN ZONE</b>
</div>

<script>
async function downloadVideo() {
    const url = document.getElementById("tiktokUrl").value.trim();
    const error = document.getElementById("error");
    const result = document.getElementById("result");
    const btn = document.getElementById("mainBtn");

    error.style.display = "none";
    result.style.display = "none";

    if (!url.includes("tiktok.com")) {
        showError("Invalid Link! Please paste a valid TikTok URL.");
        return;
    }

    btn.innerText = "Processing...";
    btn.style.opacity = "0.7";
    btn.disabled = true;

    try {
        const apis = [
            `https://tikwm.com/api/?url=${encodeURIComponent(url)}`,
            `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`
        ];

        let data = null;
        
        for (let api of apis) {
            try {
                const res = await fetch(api);
                const responseData = await res.json();
                if (responseData && responseData.code === 0) {
                    data = responseData;
                    break;
                }
            } catch (e) { continue; }
        }

        if (!data || !data.data) {
            throw new Error("Server busy. Try again.");
        }

        // Fill links
        document.getElementById("nowm").href = data.data.play || data.data.url;
        document.getElementById("wm").href = data.data.wmplay || data.data.watermark;
        document.getElementById("audio").href = data.data.music;

        // Show Results
        result.style.display = "block";
        result.style.animation = "fadeInUp 0.5s ease";

    } catch (e) {
        showError("Download Failed. Please check the URL or try again.");
    } finally {
        btn.innerText = "DOWNLOAD VIDEO";
        btn.style.opacity = "1";
        btn.disabled = false;
    }
}

function showError(msg) {
    const error = document.getElementById("error");
    error.textContent = msg;
    error.style.display = "block";
}

document.getElementById("tiktokUrl").addEventListener("keypress", (e) => {
    if (e.key === "Enter") downloadVideo();
});
</script>

</body>
</html>
